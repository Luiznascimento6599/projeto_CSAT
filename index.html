<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Avaliação de Atendimento - King Star</title>
    
    <script>
        async function validarAcesso() {
            const ipProibido = "200.155.141.154"; // IP Público da King Star

            const ipParaNumero = (ip) => {
                return ip.split('.').reduce((acc, octeto) => (acc << 8) + parseInt(octeto, 10), 0) >>> 0;
            };

            const numProibido = ipParaNumero(ipProibido);

            try {
                const response = await fetch('https://api.ipify.org?format=json');
                const data = await response.json();
                const numUsuario = ipParaNumero(data.ip);

                if (numUsuario === numProibido) {
                    document.documentElement.innerHTML = `
                        <body style="display:flex; justify-content:center; align-items:center; height:100vh; font-family:sans-serif; text-align:center;">
                            <div>
                                <h1>⚠️ Acesso Interno Identificado ⚠️</h1>
                                <p>Este formulário é exclusivo para clientes externos.<br><br>
                                Identificamos que você é um colaborador King Star. Este acesso é indevido foi registrado para fins de auditoria.</p>
                            </div>
                        </body>`;
                }
            } catch (error) {
                console.error("Erro na validação:", error);
            }
        }
        validarAcesso(); // Executa imediatamente
    </script>

        /* Estilos originais que você já fez e estão ótimos */

        .logo { width: 160px; margin-bottom: 20px; }
        /* ... resto do seu CSS ... */
    </style>
</head>
