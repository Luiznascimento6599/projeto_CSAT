<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Avaliação de Atendimento - King Star</title>
    <link rel="icon" type="image/png" href="logo.png">

    <style>
        /* 1. PREVENÇÃO DE PISCAR: O formulário começa escondido */
        #formContainer { 
            display: none; 
        }

        /* 2. ESTILIZAÇÃO VISUAL (UI/UX) */
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            background-color: #f4f7f6; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            height: 100vh; 
            margin: 0; 
        }
        .csat-card { 
            max-width: 400px; 
            width: 90%; 
            background: white; 
            padding: 30px; 
            border-radius: 15px; 
            box-shadow: 0 10px 25px rgba(0,0,0,0.1); 
            text-align: center; 
        }
        .logo { width: 160px; margin-bottom: 20px; }
        h2 { color: #03363d; margin-bottom: 10px; font-size: 22px; }
        p { color: #666; font-size: 15px; margin-bottom: 25px; }
        
        /* Opções de Seleção */
        .option { 
            display: flex; 
            align-items: center; 
            padding: 12px; 
            border: 1px solid #eee; 
            margin-bottom: 10px; 
            border-radius: 10px; 
            cursor: pointer; 
            transition: 0.3s; 
            text-align: left; 
        }
        .option:hover { background-color: #f0f7f8; border-color: #03363d; }
        input[type="radio"] { 
            margin-right: 15px; 
            width: 20px; 
            height: 20px; 
            cursor: pointer; 
            accent-color: #03363d; 
        }

        /* Botão de Envio */
        button { 
            width: 100%; 
            padding: 15px; 
            background-color: #03363d; 
            color: white; 
            border: none; 
            border-radius: 10px; 
            font-size: 16px; 
            font-weight: bold; 
            cursor: pointer; 
            margin-top: 20px; 
        }
        button:hover { background-color: #022a30; }
        button:disabled { background-color: #ccc; cursor: not-allowed; }

        /* Mensagem de Sucesso */
        #sucesso { 
            display: none; 
            color: #28a745; 
            font-weight: bold; 
            margin-top: 20px; 
            font-size: 18px; 
        }
    </style>
</head>

<body>

    <div class="csat-card" id="formContainer">
        <img src="logo.png" alt="King Star Colchões" class="logo">
        
        <div id="content">
            <h2>Como foi seu atendimento?</h2>
            <p>Sua opinião é fundamental para nós!</p>
            
            <div id="ratingList">
                <label class="option"><input type="radio" name="nota" value="5"> 5 - Muito Satisfeito</label>
                <label class="option"><input type="radio" name="nota" value="4"> 4 - Satisfeito</label>
                <label class="option"><input type="radio" name="nota" value="3"> 3 - Neutro</label>
                <label class="option"><input type="radio" name="nota" value="2"> 2 - Insatisfeito</label>
                <label class="option"><input type="radio" name="nota" value="1"> 1 - Muito Insatisfeito</label>
            </div>
            
            <button id="btnEnviar">Enviar Avaliação</button>
        </div>

        <div id="sucesso">Obrigado! Sua nota foi registrada com sucesso.</div>
    </div>

    <script>
        async function validarSeguranca() {
            const dominioProibido = "kingstarcolchoessupport.zendesk.com";
            const ipProibido = "200.155.141.154"; // IP Público fixo da King Star

            const ipParaNumero = (ip) => {
                return ip.split('.').reduce((acc, octeto) => (acc << 8) + parseInt(octeto, 10), 0) >>> 0;
            };

            const numProibido = ipParaNumero(ipProibido);
            const referrer = document.referrer.toLowerCase();

            let acessoBloqueado = false;
            let motivo = "";

            // 1. Check de Referrer (Instantâneo)
            if (referrer.includes(dominioProibido)) {
                acessoBloqueado = true;
                motivo = "Zendesk";
            }

            // 2. Check de IP (Assíncrono via API)
            if (!acessoBloqueado) {
                try {
                    const response = await fetch('https://api.ipify.org?format=json');
                    const data = await response.json();
                    const numUsuario = ipParaNumero(data.ip);

                    if (numUsuario === numProibido) {
                        acessoBloqueado = true;
                        motivo = "Rede Interna";
                    }
                } catch (e) {
                    console.error("Erro na validação de IP. Permitindo por segurança.");
                }
            }

            // 3. Resultado da Validação
            if (acessoBloqueado) {
                // Se bloqueado, substitui o conteúdo por erro estilizado
                document.body.innerHTML = `
                    <div>
                       <h1>⚠️ Acesso Interno Identificado ⚠️</h1>
                       <p>Este formulário é exclusivo para clientes externos.<br><br>
                       Identificamos que você é um colaborador King Star. Este acesso é indevido foi registrado para fins de auditoria.</
                    </div>

            } else {
                // Se liberado, exibe o formulário que estava oculto
                document.getElementById('formContainer').style.display = 'block';
            }
        }

        // Inicia a segurança imediatamente
        validarSeguranca();
