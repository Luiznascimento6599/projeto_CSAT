<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Avaliação de Atendimento - King Star</title>
    <link rel="icon" type="image/png" href="logo.png">

    <style>
        /* 1. PREVENÇÃO DE GLITCH: O formulário começa escondido */
        #formContainer { 
            display: none; 
        }

        /* 2. ESTILIZAÇÃO VISUAL (UI/UX) */
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            background-color: #f4f7f6; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            height: 100vh; 
            margin: 0; 
        }
        .csat-card { 
            max-width: 400px; 
            width: 90%; 
            background: white; 
            padding: 30px; 
            border-radius: 15px; 
            box-shadow: 0 10px 25px rgba(0,0,0,0.1); 
            text-align: center; 
        }
        .logo { width: 160px; margin-bottom: 20px; }
        h2 { color: #03363d; margin-bottom: 10px; font-size: 22px; }
        p { color: #666; font-size: 15px; margin-bottom: 25px; }
        
        .option { 
            display: flex; 
            align-items: center; 
            padding: 12px; 
            border: 1px solid #eee; 
            margin-bottom: 10px; 
            border-radius: 10px; 
            cursor: pointer; 
            transition: 0.3s; 
            text-align: left; 
        }
        .option:hover { background-color: #f0f7f8; border-color: #03363d; }
        input[type="radio"] { 
            margin-right: 15px; 
            width: 20px; 
            height: 20px; 
            cursor: pointer; 
            accent-color: #03363d; 
        }

        button { 
            width: 100%; 
            padding: 15px; 
            background-color: #03363d; 
            color: white; 
            border: none; 
            border-radius: 10px; 
            font-size: 16px; 
            font-weight: bold; 
            cursor: pointer; 
            margin-top: 20px; 
        }
        button:hover { background-color: #022a30; }
        button:disabled { background-color: #ccc; cursor: not-allowed; }

        #sucesso { 
            display: none; 
            color: #28a745; 
            font-weight: bold; 
            margin-top: 20px; 
            font-size: 18px; 
        }
    </style>
</head>

<body>

    <div class="csat-card" id="formContainer">
        <img src="logo.png" alt="Minha Empresa" class="logo">
        
        <div id="content">
            <h2>Como foi seu atendimento?</h2>
            <p>Sua opinião é fundamental para nós!</p>
            
            <div id="ratingList">
                <label class="option"><input type="radio" name="nota" value="5"> 5 - Muito Satisfeito</label>
                <label class="option"><input type="radio" name="nota" value="4"> 4 - Satisfeito</label>
                <label class="option"><input type="radio" name="nota" value="3"> 3 - Neutro</label>
                <label class="option"><input type="radio" name="nota" value="2"> 2 - Insatisfeito</label>
                <label class="option"><input type="radio" name="nota" value="1"> 1 - Muito Insatisfeito</label>
            </div>
            
            <button id="btnEnviar">Enviar Avaliação</button>
        </div>

        <div id="sucesso">Obrigado! Sua nota foi registrada com sucesso.</div>
    </div>

    <script>
        async function validarSeguranca() {
            const dominioProibido = "kingstarcolchoessupport.zendesk.com";
            const ipProibido = "200.155.141.154"; 

            const ipParaNumero = (ip) => {
                return ip.split('.').reduce((acc, octeto) => (acc << 8) + parseInt(octeto, 10), 0) >>> 0;
            };

            const numProibido = ipParaNumero(ipProibido);
            const referrer = document.referrer.toLowerCase();

            let acessoBloqueado = false;
            let motivo = "";

            if (referrer.includes(dominioProibido)) {
                acessoBloqueado = true;
                motivo = "Zendesk";
            }

            if (!acessoBloqueado) {
                try {
                    const response = await fetch('https://api.ipify.org?format=json');
                    const data = await response.json();
                    const numUsuario = ipParaNumero(data.ip);

                    if (numUsuario === numProibido) {
                        acessoBloqueado = true;
                        motivo = "Rede Interna";
                    }
                } catch (e) {
                    console.error("Erro na validação de IP.");
                }
            }

            if (acessoBloqueado) {
                document.body.innerHTML = `
                    <div style="margin:auto; font-family:sans-serif; text-align:center; padding:40px; background:white; border-radius:15px; box-shadow:0 10px 25px rgba(0,0,0,0.1); max-width:400px; width:90%;">
                       <h1 style="font-size:48px; margin:0;">⚠️</h1>
                       <h2 style="color:#03363d;">Acesso Não Permitido</h2>
                       <p style="color:#666; line-height:1.6;">Este formulário é exclusivo para clientes externos.<br><br>
                       Identificamos que você é um colaborador <strong>King Star</strong>. Este acesso indevido foi registrado para fins de auditoria.</p>
                       <p style="font-size:11px; color:#ccc; margin-top:20px;">REF: ${motivo}</p>
                    </div>`;
            } else {
                document.getElementById('formContainer').style.display = 'block';
            }
        }

        validarSeguranca();

        // --- LÓGICA DE ENVIO ---
        const GOOGLE_URL = "https://script.google.com/macros/s/AKfycbxvsOa9cwjw4gkUYFbPMlar_w5pa1kgWnSYz3JIbpUjGAKVh940PEpoQ0Pk4AGhovmm4Q/exec";
        const SEC_TOKEN = "KS_PRO_2026_SECURE";

        document.getElementById('btnEnviar').addEventListener('click', function() {
            const selecionada = document.querySelector('input[name="nota"]:checked');
            const btn = this;

            if (!selecionada) return alert("Por favor, selecione uma nota.");

            const urlParams = new URLSearchParams(window.location.search);
            const ticketId = urlParams.get('id');

            if (!ticketId) return alert("Erro: ID do ticket ausente.");

            btn.disabled = true;
            btn.innerText = "Enviando...";

            const payload = {
                security_token: SEC_TOKEN,
                ticket_id: ticketId,
                nota: selecionada.value,
                origem_clique: document.referrer || "WhatsApp/Direto"
            };

            fetch(GOOGLE_URL, {
                method: 'POST',
                mode: 'no-cors',
                body: JSON.stringify(payload)
            })
            .then(() => {
                document.getElementById('content').style.display = 'none';
                document.getElementById('sucesso').style.display = 'block';
            })
            .catch(() => {
                alert("Erro ao enviar. Tente novamente.");
                btn.disabled = false;
                btn.innerText = "Enviar Avaliação";
            });
        });
    </script>
</body>
</html>
